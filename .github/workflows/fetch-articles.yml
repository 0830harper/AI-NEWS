name: Fetch Articles

on:
  schedule:
    - cron: '0 16 * * *'   # App    → 北京时间 00:00
    - cron: '0 22 * * *'   # Design → 北京时间 06:00
    - cron: '0 4 * * *'    # UX/UI  → 北京时间 12:00
    - cron: '0 10 * * *'   # Tech   → 北京时间 18:00
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to fetch (app/design/uxui/tech)'
        required: false
        default: 'app'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Pick category by schedule
        id: pick
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          case "$SCHEDULE" in
            "0 16 * * *") CAT=app ;;
            "0 22 * * *") CAT=design ;;
            "0 4 * * *")  CAT=uxui ;;
            "0 10 * * *") CAT=tech ;;
            *)             CAT="${{ github.event.inputs.category || 'app' }}" ;;
          esac
          echo "cat=$CAT" >> $GITHUB_OUTPUT
          echo "Fetching category: $CAT (triggered by schedule: $SCHEDULE)"

      - name: Write and verify .env.local
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: |
          printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$SUPABASE_URL" > .env.local
          printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY" >> .env.local
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY" >> .env.local
          printf 'SILICONFLOW_API_KEY=%s\n' "$SILICONFLOW_API_KEY" >> .env.local
          echo "=== .env.local key lengths ==="
          while IFS='=' read -r key value; do
            echo "  $key: ${#value} chars"
          done < .env.local

      - name: Run fetcher
        run: npx tsx --env-file=.env.local scripts/fetch-category.ts ${{ steps.pick.outputs.cat }}
