<svg xmlns="http://www.w3.org/2000/svg" width="80" height="88" viewBox="0 0 80 88" fill="none">
  <defs>
    <filter id="sticker" x="-20%" y="-15%" width="140%" height="130%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="4" result="e"/>
      <feFlood flood-color="#ffffff" result="w"/>
      <feComposite in="w" in2="e" operator="in" result="wo"/>
      <feOffset dx="3" dy="4" in="e" result="so"/>
      <feFlood flood-color="#bebebe" result="sc"/>
      <feComposite in="sc" in2="so" operator="in" result="s"/>
      <feMerge>
        <feMergeNode in="s"/>
        <feMergeNode in="wo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#sticker)" transform="translate(8,8)">
    <rect x="9" y="14" width="48" height="44" rx="10" fill="#1a1a1a"/>
    <rect x="7" y="12" width="48" height="44" rx="10" fill="#ffffff"/>
    <rect x="7" y="12" width="48" height="44" rx="10" fill="none" stroke="#1a1a1a" stroke-width="3"/>
    <rect x="7" y="12" width="48" height="12" rx="10" fill="#1a1a1a"/>
    <rect x="7" y="18" width="48" height="6" fill="#1a1a1a"/>
    <circle cx="16" cy="18" r="3" fill="#ffffff"/>
    <circle cx="25" cy="18" r="3" fill="#ffffff"/>
    <circle cx="34" cy="18" r="3" fill="#ffffff"/>
    <text x="13" y="38" font-family="'Courier New', monospace" font-size="8.5" font-weight="700" fill="#1a1a1a">&#x276F; ai.run()</text>
    <rect x="13" y="41" width="28" height="2.5" rx="1.2" fill="#1a1a1a" opacity="0.2"/>
    <rect x="13" y="46" width="18" height="2.5" rx="1.2" fill="#1a1a1a" opacity="0.15"/>
    <rect x="32" y="44" width="4" height="6" rx="1" fill="#1a1a1a"/>
  </g>
</svg>
