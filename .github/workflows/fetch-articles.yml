name: Fetch Articles

on:
  schedule:
    - cron: '0 16 * * *'   # App    → 北京时间 00:00
    - cron: '0 22 * * *'   # Design → 北京时间 06:00
    - cron: '0 4 * * *'    # UX/UI  → 北京时间 12:00
    - cron: '0 10 * * *'   # Tech   → 北京时间 18:00
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to fetch (app/design/uxui/tech)'
        required: false
        default: 'app'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Pick category by UTC hour
        id: pick
        run: |
          HOUR=$(date -u +%-H)
          case $HOUR in
            16) CAT=app ;;
            22) CAT=design ;;
            4)  CAT=uxui ;;
            10) CAT=tech ;;
            *)  CAT="${{ github.event.inputs.category || 'app' }}" ;;
          esac
          echo "cat=$CAT" >> $GITHUB_OUTPUT
          echo "Fetching category: $CAT"

      - name: Run fetcher
        run: npx tsx scripts/fetch-category.ts ${{ steps.pick.outputs.cat }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
